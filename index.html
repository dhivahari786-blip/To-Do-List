<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To Do List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <h2 class="text-center mb-4">ToDo List</h2>

            <!-- Input and Buttons -->
            <div class="input-group mb-3">
                <input type="text" id="taskInput" class="form-control" placeholder="Enter a task">
                <button class="btn btn-primary" id="addTaskBtn">Add Task</button>
            </div>

            <!-- Task List -->
            <ul class="list-group" id="taskList">
                <!-- Tasks will appear here -->
            </ul>

        </div>
    </div>
</div>
<div class="container mt-5">
    <h4 class="text-center mb-3">Project Screenshots</h4>

    <img src="images/Screenshot-1.jpg" class="img-fluid mb-3">
    <img src="images/Screenshot-2.jpg" class="img-fluid mb-3">
    <img src="images/Screenshot-3.jpg" class="img-fluid mb-3">
    <img src="images/Screenshot-4.jpg" class="img-fluid mb-3">
    <img src="images/Screenshot-5.jpg" class="img-fluid mb-3">
</div>
<!-- External JavaScript -->
<script src="index.js"></script>
</body>
</html>
